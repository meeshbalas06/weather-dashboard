name: Daily Weather Report

on:
  schedule:
    # Runs at 9 AM EST (2 PM UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual triggering

permissions:
  issues: write
  contents: read

jobs:
  weather-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch weather data
        id: weather
        env:
          API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python scripts/fetch_weather.py >> $GITHUB_OUTPUT
      
      - name: Create GitHub Issue
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const weatherInfo = fs.readFileSync('weather_report.txt', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Weather Report - ${new Date().toLocaleDateString()}`,
              body: weatherInfo,
              labels: ['weather-report']
            });
